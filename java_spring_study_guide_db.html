<!DOCTYPE html>
<html lang="ko">
<head id="heads">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="nav"></nav>

                <p>Java · Spring Boot · SI</p>

    <footer id="ft"></footer>

    <script type="module" src="lib/js/nav.js"></script>

    <script type="module" src="lib/js/night-mode.js"></script>
    
    <!-- 학습 가이드 관련 스크립트 -->
